services:
  - type: web
    name: cybus-api
    runtime: node
    plan: starter
    rootDir: bus-tracker/backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.14.0
      - key: PORT
        value: 3001
      - key: ALLOWED_ORIGINS
        sync: false

  - type: web
    name: cybus-web
    runtime: node
    plan: starter
    rootDir: bus-tracker/frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start -- --hostname 0.0.0.0 --port $PORT
    envVars:
      - key: NODE_VERSION
        value: 22.14.0
      - key: NEXT_PUBLIC_API_URL
        sync: false
